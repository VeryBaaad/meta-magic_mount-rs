name: release-build
on:
  push:
    tags:
      - "v*.*.*"
env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: arm64
            rust-target: aarch64-linux-android
          - target: armv7
            rust-target: armv7-linux-androideabi
          - target: x86-64
            rust-target: x86_64-linux-android
          - target: universal
            rust-target: x86_64-linux-android, aarch64-linux-android, armv7-linux-androideabi
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r29
          add-to-path: true
          local-cache: true
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: nightly
          targets: ${{ matrix.rust-target }}
          components: rust-src, rustc-codegen-cranelift-preview
      - name: Install pnpm
        uses: pnpm/action-setup@v6.0.9
        with:
          run_install: false
          package_json_file: webui/package.json
      - name: Setup node
        uses: actions/setup-node@v7.0.0
        with:
          node-version: "lts/*"
          cache: pnpm
          cache-dependency-path: webui/pnpm-lock.yaml
      - name: Install cargo-ndk
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-ndk
      - name: Setup Webui deps
        working-directory: webui
        run: pnpm install --frozen-lockfile
      - name: Setup keys
        run: |
          echo ${{ secrets.SIGN_PRIVATE_KEY }} | base64 -d > priv_key
          echo ${{ secrets.SIGN_PUBLIC_KEY }} | base64 -d > pub_key
      - name: Build
        run: cargo xtask build -t ${{ matrix.target }}
      - name: Upload build output
        uses: actions/upload-artifact@v7
        with:
          archive: false
          path: output/*.zip
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Download build outputs
        uses: actions/download-artifact@v8
        with:
          pattern: magic_mount_rs-*
          path: output
          merge-multiple: true
          skip-decompress: true
      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff
      - name: Generate Changelog
        run: |
          PROP_FILE="module/module.prop"
          VERSION=$(grep "^version=" "$PROP_FILE" | cut -d= -f2 | sed 's/-.*//')
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          git-cliff "$PREV_TAG".."$VERSION" -o /tmp/changelog.md
      - name: Create Release with GitHub CLI
        run: |
          gh release create ${{ github.ref_name }} \
            --title "${{ github.ref_name }}" \
            --notes-file /tmp/changelog.md \
            --draft=false \
            --prerelease=false \
            output/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Push Telegram Notice
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          RUN_NO: ${{ github.run_number }}
          RUN_ID: ${{ github.run_id }}
          IS_RELEASE: true
        run: |
          if [ -z "${BOT_TOKEN:-}" ] || [ -z "${CHAT_ID:-}" ]; then
            exit 0
          fi
          cd .github/bot
          pip3 install -e .
          cd ../..
          python3 -m bot
